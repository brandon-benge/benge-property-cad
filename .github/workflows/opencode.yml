name: opencode

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  opened-issue:
    name: Handle opened issue

    if: >
      github.event_name == 'issues' &&
      github.actor == github.repository_owner

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        shell: bash
        run: |
          git config --global user.name "opencode[bot]"
          git config --global user.email "opencode[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: opencode-go/glm-5.2
          use_github_token: true
          prompt: |
            Work on GitHub issue #${{ github.event.issue.number }}.

            Issue title:
            ${{ github.event.issue.title }}

            Issue description:
            ${{ github.event.issue.body }}

            Follow the repository instructions and governance requirements.

            Analyze the issue, make only the changes necessary to resolve it,
            run the relevant validation and tests, and commit the completed
            changes.

            Update the issue with a clear summary of:
            - what changed
            - what validation was run
            - whether the issue is fully resolved
            - any remaining concerns or required follow-up

  issue-comment:
    name: Handle OpenCode comment

    if: >
      github.event_name == 'issue_comment' &&
      github.actor == github.repository_owner &&
      (
        startsWith(github.event.comment.body, '/oc') ||
        startsWith(github.event.comment.body, '/opencode')
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        shell: bash
        run: |
          git config --global user.name "opencode[bot]"
          git config --global user.email "opencode[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: opencode-go/glm-5.2
          use_github_token: true