name: opencode

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  opened-issue:
    name: Handle opened issue

    if: >
      github.event_name == 'issues' &&
      github.actor == github.repository_owner

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Wait for prior workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.repository.default_branch;
            const currentRunId = context.runId;
            const MAX_WAIT_MS = 7_200_000;
            const POLL_INTERVAL_MS = 30_000;
            const startTime = Date.now();

            core.info(`Waiting for prior workflow runs on "${branch}"...`);

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: inProgress } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch,
                status: 'in_progress',
                per_page: 100,
              });
              const { data: queued } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch,
                status: 'queued',
                per_page: 100,
              });

              const otherRuns = [...inProgress.workflow_runs, ...queued.workflow_runs]
                .filter(run => run.id !== currentRunId && run.status !== 'completed');

              if (otherRuns.length === 0) {
                core.info('No prior workflow runs in progress. Proceeding.');
                return;
              }

              const names = otherRuns.map(r => `${r.name}#${r.run_number}`).join(', ');
              core.info(`Waiting for ${otherRuns.length} run(s): ${names}`);
              await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
            }

            core.warning(`Timed out after 7200s waiting for prior runs. Proceeding.`);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        shell: bash
        run: |
          git config --global user.name "opencode[bot]"
          git config --global user.email "opencode[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: opencode-go/glm-5.2
          use_github_token: true
          prompt: |
            Work on GitHub issue #${{ github.event.issue.number }}.

            Issue title:
            ${{ github.event.issue.title }}

            Issue description:
            ${{ github.event.issue.body }}

            Follow the repository instructions and governance requirements.

            Analyze the issue, make only the changes necessary to resolve it,
            run the relevant validation and tests, and commit the completed
            changes.

            Update the issue with a clear summary of:
            - what changed
            - what validation was run
            - whether the issue is fully resolved
            - any remaining concerns or required follow-up

  issue-comment:
    name: Handle OpenCode comment

    if: >
      github.event_name == 'issue_comment' &&
      github.actor == github.repository_owner &&
      (
        startsWith(github.event.comment.body, '/oc') ||
        startsWith(github.event.comment.body, '/opencode')
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Wait for prior workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.repository.default_branch;
            const currentRunId = context.runId;
            const MAX_WAIT_MS = 7_200_000;
            const POLL_INTERVAL_MS = 30_000;
            const startTime = Date.now();

            core.info(`Waiting for prior workflow runs on "${branch}"...`);

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: inProgress } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch,
                status: 'in_progress',
                per_page: 100,
              });
              const { data: queued } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch,
                status: 'queued',
                per_page: 100,
              });

              const otherRuns = [...inProgress.workflow_runs, ...queued.workflow_runs]
                .filter(run => run.id !== currentRunId && run.status !== 'completed');

              if (otherRuns.length === 0) {
                core.info('No prior workflow runs in progress. Proceeding.');
                return;
              }

              const names = otherRuns.map(r => `${r.name}#${r.run_number}`).join(', ');
              core.info(`Waiting for ${otherRuns.length} run(s): ${names}`);
              await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
            }

            core.warning(`Timed out after 7200s waiting for prior runs. Proceeding.`);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        shell: bash
        run: |
          git config --global user.name "opencode[bot]"
          git config --global user.email "opencode[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: opencode-go/glm-5.2
          use_github_token: true