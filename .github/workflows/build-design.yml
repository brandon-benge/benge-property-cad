name: Build Benge backyard design

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  headless-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r .tools/requirements/dev.lock
      - run: ruff check model.py config.py project_tests
      - run: mypy
      - run: pytest -q
      - name: Verify deterministic semantic output
        run: |
          python -c "import json; print(json.load(open('generated/manifests/build-manifest.json'))['semantic_hash'])" > /tmp/first.hash
          python build.py
          python -c "import json; print(json.load(open('generated/manifests/build-manifest.json'))['semantic_hash'])" > /tmp/second.hash
          diff /tmp/first.hash /tmp/second.hash
      - uses: actions/upload-artifact@v4
        with:
          name: benge-backyard-generated
          path: generated/
